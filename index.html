<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来場者カウンター</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin: 10px;
}

/* 男女の大ボタン */
.big {
  font-size: 28px;
  padding: 25px;
  margin: 10px;
  width: 40%;
}

/* 通常ボタン */
button {
  font-size: 18px;
  padding: 10px;
  margin: 5px;
}

/* 選択状態 */
.selected {
  background: #4caf50;
  color: white;
}
</style>
</head>

<body>

<h2>来場者カウント</h2>

<!-- ✅ 男女（大ボタン） -->
<div>
  <button class="big" onclick="quickAdd('男')">男</button>
  <button class="big" onclick="quickAdd('女')">女</button>
</div>

<!-- ✅ 学年 -->
<div id="grade">
  <button onclick="select('grade','1年',this)">1年</button>
  <button onclick="select('grade','2年',this)">2年</button>
  <button onclick="select('grade','3年',this)">3年</button>
</div>

<!-- ✅ 同伴者（先生追加） -->
<div id="companion">
  <button onclick="select('companion','保護者',this)">保護者</button>
  <button onclick="select('companion','友達',this)">友達</button>
  <button onclick="select('companion','先生',this)">先生</button>
</div>

<h3 id="count">合計: 0</h3>

<!-- ✅ 操作ボタン -->
<div>
  <button onclick="undo()">取り消し</button>
  <button onclick="clearScreen()">画面クリア</button>
</div>

<br>

<button onclick="toggleStats()">集計を見る</button>
<div id="stats" style="display:none;"></div>

<script>
let current = {};
let data = JSON.parse(localStorage.getItem("logs") || "[]");

updateCount();

/* ✅ 学年・同伴者の選択（保持される） */
function select(type, value, btn) {
  let parent = btn.parentElement;
  parent.querySelectorAll("button").forEach(b => b.classList.remove("selected"));

  current[type] = value;
  btn.classList.add("selected");
}

/* ✅ 男女ボタンで即登録 */
function quickAdd(gender) {
  if (!current.grade || !current.companion) {
    alert("学年と同伴者を選んでください");
    return;
  }

  let entry = {
    gender: gender,
    grade: current.grade,
    companion: current.companion,
    time: Date.now()
  };

  data.push(entry);
  localStorage.setItem("logs", JSON.stringify(data));

  updateCount();

  // バイブ（対応端末のみ）
  if (navigator.vibrate) navigator.vibrate(50);
}

/* ✅ 合計表示 */
function updateCount() {
  document.getElementById("count").innerText = "合計: " + data.length;
}

/* ✅ 取り消し（最後の1件削除） */
function undo() {
  if (data.length === 0) return;

  data.pop();
  localStorage.setItem("logs", JSON.stringify(data));
  updateCount();
}

/* ✅ 画面クリア（リロード） */
function clearScreen() {
  location.reload();
}

/* ✅ 集計表示 */
function toggleStats() {
  let div = document.getElementById("stats");

  if (div.style.display === "none") {
    div.style.display = "block";
    showStats();
  } else {
    div.style.display = "none";
  }
}

function showStats() {
  let stats = {
    男: 0, 女: 0,
    "1年": 0, "2年": 0, "3年": 0,
    保護者: 0, 友達: 0, 先生: 0
  };

  data.forEach(d => {
    stats[d.gender]++;
    stats[d.grade]++;
    stats[d.companion]++;
  });

  let html = `
    <p>男: ${stats["男"]} / 女: ${stats["女"]}</p>
    <p>1年: ${stats["1年"]} / 2年: ${stats["2年"]} / 3年: ${stats["3年"]}</p>
    <p>保護者: ${stats["保護者"]} / 友達: ${stats["友達"]} / 先生: ${stats["先生"]}</p>
  `;

  document.getElementById("stats").innerHTML = html;
}

/* ✅ Service Worker登録 */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update();
  });
}
</script>

</body>
</html>
