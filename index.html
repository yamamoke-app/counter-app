<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来場者カウンター</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: sans-serif; text-align: center; }
button {
  font-size: 20px;
  padding: 15px;
  margin: 5px;
  width: 30%;
}
.selected { background: #4caf50; color: white; }
</style>
</head>

<body>

<h2>来場者カウント</h2>

<div>
  <button onclick="select('gender','男')">男</button>
  <button onclick="select('gender','女')">女</button>
</div>

<div>
  <button onclick="select('grade','1年')">1年</button>
  <button onclick="select('grade','2年')">2年</button>
  <button onclick="select('grade','3年')">3年</button>
</div>

<div>
  <button onclick="select('companion','保護者')">保護者</button>
  <button onclick="select('companion','友達')">友達</button>
</div>

<br>
<button onclick="register()">登録</button>

<h3 id="count">合計: 0</h3>

<button onclick="exportCSV()">CSV出力</button>

<script>
let current = {};
let data = JSON.parse(localStorage.getItem("logs") || "[]");

updateCount();

function select(type, value) {
  current[type] = value;
}

function register() {
  if (!current.gender || !current.grade || !current.companion) {
    alert("全部選択してください");
    return;
  }

  data.push({ ...current, time: Date.now() });
  localStorage.setItem("logs", JSON.stringify(data));

  current = {};
  updateCount();
}

function updateCount() {
  document.getElementById("count").innerText = "合計: " + data.length;
}

function exportCSV() {
  let csv = "gender,grade,companion\n";
  data.forEach(d => {
    csv += `${d.gender},${d.grade},${d.companion}\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "data.csv";
  a.click();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
