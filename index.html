<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来場者カウンター</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin: 10px;
}

/* 横並び */
.row {
  display: flex;
  justify-content: center;
  gap: 6px;
}

/* ボタン共通（←ここ重要：見た目を完全統一） */
button {
  font-size: 18px;
  padding: 12px;
  border-radius: 14px;
  border: none;
  appearance: none;
  -webkit-appearance: none;
}

/* 男女 */
.row-2 button {
  width: 45%;
  font-size: 26px;
  padding: 20px;
}

/* 学年 */
.row-3 button {
  width: 30%;
  font-size: 20px;
  padding: 16px;
}

/* 同伴 */
.row-4 button {
  width: 22%;
}

/* 選択状態（角丸維持） */
.selected {
  background: #4caf50;
  color: white;
  border-radius: 14px;
}

/* 登録 */
.register {
  width: 90%;
  font-size: 26px;
  padding: 20px;
  background: #4caf50;
  color: white;
}

/* 下ボタン */
.undo {
  background: #f44336;
  color: white;
  width: 45%;
}

.clear {
  background: #00bcd4;
  color: white;
  width: 45%;
}

/* 書き出し */
.export {
  background: #673ab7;
  color: white;
  width: 90%;
}

/* 無効 */
button:disabled {
  opacity: 0.4;
}
</style>
</head>

<body>

<h2>来場者カウント</h2>

<!-- 男女 -->
<div class="row row-2">
  <button onclick="select('gender','男',this)">男</button>
  <button onclick="select('gender','女',this)">女</button>
</div>

<!-- 学年 -->
<div class="row row-3">
  <button onclick="select('grade','1年',this)">1年</button>
  <button onclick="select('grade','2年',this)">2年</button>
  <button onclick="select('grade','3年',this)">3年</button>
</div>

<!-- 同伴 -->
<div class="row row-4">
  <button onclick="select('companion','なし',this)">なし</button>
  <button onclick="select('companion','保護者',this)">保護者</button>
  <button onclick="select('companion','友達',this)">友達</button>
  <button onclick="select('companion','先生',this)">先生</button>
  <button onclick="select('companion','その他',this)">その他</button>
</div>

<br>

<!-- 登録 -->
<button id="registerBtn" class="register" onclick="register()" disabled>登録</button>

<br><br>

<!-- 下段 -->
<div class="row">
  <button class="undo" onclick="undo()">取り消し</button>
  <button class="clear" onclick="clearScreen()">画面クリア</button>
</div>

<br>

<!-- ✅ 追加：書き出し -->
<button class="export" onclick="exportCSV()">集計を書き出す</button>

<h3 id="count">合計: 0</h3>

<script>
let current = {};
let data = JSON.parse(localStorage.getItem("logs") || "[]");

updateCount();
updateRegisterState();

/* 選択 */
function select(type, value, btn) {
  let parent = btn.parentElement;
  parent.querySelectorAll("button").forEach(b => b.classList.remove("selected"));

  current[type] = value;
  btn.classList.add("selected");

  updateRegisterState();
}

/* 登録ボタン制御 */
function updateRegisterState() {
  const btn = document.getElementById("registerBtn");
  btn.disabled = !(current.gender && current.grade && current.companion);
}

/* 登録 */
function register() {
  data.push({ ...current, time: Date.now() });
  localStorage.setItem("logs", JSON.stringify(data));

  if (navigator.vibrate) navigator.vibrate(50);

  location.reload();
}

/* 取り消し */
function undo() {
  if (data.length === 0) return;

  data.pop();
  localStorage.setItem("logs", JSON.stringify(data));
  updateCount();
}

/* 画面クリア */
function clearScreen() {
  location.reload();
}

/* 合計 */
function updateCount() {
  document.getElementById("count").innerText = "合計: " + data.length;
}

/* ✅ CSV書き出し */
function exportCSV() {
  if (data.length === 0) return;

  let csv = "性別,学年,同伴,時間\n";

  data.forEach(d => {
    let date = new Date(d.time).toLocaleString();
    csv += `${d.gender},${d.grade},${d.companion},${date}\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "来場者データ.csv";
  link.click();
}

/* Service Worker */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
