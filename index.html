<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来場者カウンター</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: sans-serif;
  text-align: center;
}

/* 共通 */
button {
  font-size: 18px;
  padding: 12px;
  margin: 6px;
}

/* 男女 */
.big {
  font-size: 26px;
  padding: 20px;
  width: 42%;
}

/* 学年（横いっぱい） */
.wide {
  font-size: 20px;
  padding: 18px;
  width: 86%;
}

/* 選択状態 */
.selected {
  background: #4caf50;
  color: white;
}

/* 操作ボタン色 */
.register {
  background: #4caf50;
  color: white;
}

.undo {
  background: #f44336;
  color: white;
}

.clear {
  background: #00bcd4;
  color: white;
}

/* 無効 */
button:disabled {
  opacity: 0.4;
}
</style>
</head>

<body>

<h2>来場者カウント</h2>

<!-- 男女 -->
<div>
  <button class="big" onclick="select('gender','男',this)">男</button>
  <button class="big" onclick="select('gender','女',this)">女</button>
</div>

<!-- 学年 -->
<div>
  <button class="wide" onclick="select('grade','1年',this)">1年</button><br>
  <button class="wide" onclick="select('grade','2年',this)">2年</button><br>
  <button class="wide" onclick="select('grade','3年',this)">3年</button>
</div>

<!-- 同伴（なし追加＆先頭へ） -->
<div>
  <button onclick="select('companion','なし',this)">なし</button>
  <button onclick="select('companion','保護者',this)">保護者</button>
  <button onclick="select('companion','友達',this)">友達</button>
  <button onclick="select('companion','先生',this)">先生</button>
  <button onclick="select('companion','その他',this)">その他</button>
</div>

<br>

<!-- 操作 -->
<button id="registerBtn" class="register" onclick="register()" disabled>登録</button>
<button class="undo" onclick="undo()">取り消し</button>
<button class="clear" onclick="clearScreen()">画面クリア</button>

<h3 id="count">合計: 0</h3>

<button onclick="toggleStats()">集計を見る</button>
<div id="stats" style="display:none;"></div>

<script>
let current = {};
let data = JSON.parse(localStorage.getItem("logs") || "[]");

updateCount();
updateRegisterState();

// ✅ 選択
function select(type, value, btn) {
  let parent = btn.parentElement;
  parent.querySelectorAll("button").forEach(b => b.classList.remove("selected"));

  current[type] = value;
  btn.classList.add("selected");

  updateRegisterState();
}

// ✅ 登録ボタン制御
function updateRegisterState() {
  const btn = document.getElementById("registerBtn");
  btn.disabled = !(current.gender && current.grade && current.companion);
}

// ✅ 登録 → 保存 → リロード
function register() {
  data.push({ ...current, time: Date.now() });
  localStorage.setItem("logs", JSON.stringify(data));

  if (navigator.vibrate) navigator.vibrate(50);

  location.reload(); // ← ここが今回の変更ポイント
}

// ✅ 取り消し
function undo() {
  if (data.length === 0) return;

  data.pop();
  localStorage.setItem("logs", JSON.stringify(data));
  updateCount();
}

// ✅ 画面クリア
function clearScreen() {
  location.reload();
}

// ✅ 合計
function updateCount() {
  document.getElementById("count").innerText = "合計: " + data.length;
}

// ✅ 集計
function toggleStats() {
  let div = document.getElementById("stats");

  if (div.style.display === "none") {
    div.style.display = "block";
    showStats();
  } else {
    div.style.display = "none";
  }
}

function showStats() {
  let stats = {
    男: 0, 女: 0,
    "1年": 0, "2年": 0, "3年": 0,
    なし: 0, 保護者: 0, 友達: 0, 先生: 0, その他: 0
  };

  data.forEach(d => {
    stats[d.gender]++;
    stats[d.grade]++;
    stats[d.companion]++;
  });

  document.getElementById("stats").innerHTML = `
    <p>男: ${stats["男"]} / 女: ${stats["女"]}</p>
    <p>1年: ${stats["1年"]} / 2年: ${stats["2年"]} / 3年: ${stats["3年"]}</p>
    <p>なし: ${stats["なし"]} / 保護者: ${stats["保護者"]} / 友達: ${stats["友達"]} / 先生: ${stats["先生"]} / その他: ${stats["その他"]}</p>
  `;
}

// ✅ Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
